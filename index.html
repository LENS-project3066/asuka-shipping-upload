<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写真アップロード</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; padding: 16px; min-height: 100vh; }
.container { max-width: 440px; margin: 0 auto; }
h1 { font-size: 18px; text-align: center; margin-bottom: 4px; font-weight: 600; }
.subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }

/* ボタンエリア */
.btn-area { display: flex; gap: 10px; margin-bottom: 16px; }
.btn { flex: 1; padding: 14px 8px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
.btn-camera { background: #1976d2; color: #fff; }
.btn-camera:active { background: #1565c0; }
.btn-gallery { background: #fff; color: #1976d2; border: 2px solid #1976d2; }
.btn-gallery:active { background: #e3f2fd; }
input[type="file"] { display: none; }

/* サムネイルグリッド */
.thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.thumb-item { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; }
.thumb-item img { width: 100%; height: 100%; object-fit: cover; }
.thumb-remove { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.thumb-item.uploading { opacity: 0.5; }
.thumb-item.uploaded { border: 2px solid #4caf50; }
.thumb-check { position: absolute; bottom: 4px; right: 4px; font-size: 18px; }

/* 送信ボタン */
.btn-send { display: block; width: 100%; padding: 16px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
.btn-send:active { background: #388e3c; }
.btn-send:disabled { background: #bbb; }

/* ステータス */
.status { text-align: center; padding: 12px; font-size: 14px; border-radius: 6px; margin-bottom: 12px; }
.status-success { background: #e8f5e9; color: #2e7d32; }
.status-error { background: #ffebee; color: #e53935; }
.status-uploading { background: #e3f2fd; color: #1976d2; }
.hidden { display: none; }

/* 送信済みカウンター */
.counter { text-align: center; color: #888; font-size: 13px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1 id="pageTitle">写真アップロード</h1>
  <p class="subtitle" id="pageSubtitle">写真をPC側に送信します</p>

  <div class="btn-area">
    <button class="btn btn-camera" id="cameraBtn">📷 カメラで撮影</button>
    <button class="btn btn-gallery" id="galleryBtn">🖼 写真を選ぶ</button>
  </div>
  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <input type="file" id="galleryInput" accept="image/*" multiple>

  <div class="thumb-grid" id="thumbGrid"></div>

  <button class="btn-send hidden" id="sendBtn" disabled>送信する</button>
  <div class="status hidden" id="statusArea"></div>
  <div class="counter hidden" id="counter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function() {
  const SUPABASE_URL = 'https://imunxfojosnpoohbkuyd.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltdW54Zm9qb3NucG9vaGJrdXlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxODAyNzIsImV4cCI6MjA3ODc1NjI3Mn0.5opdeiZ-eAboMERcZKwD3F1K8Mrd8tu7v6D8f41qIS8';
  const BUCKET = 'quality-docs';
  const FOLDER = 'shipping-manuals/uploads';
  var urlParams = new URLSearchParams(window.location.search);
  var SOURCE = urlParams.get('source') || 'shipping';

  // sourceに応じてタイトル変更
  var titles = { shipping: '出荷マニュアル', quality: '不具合写真' };
  document.getElementById('pageTitle').textContent = titles[SOURCE] || '写真アップロード';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const cameraBtn = document.getElementById('cameraBtn');
  const galleryBtn = document.getElementById('galleryBtn');
  const cameraInput = document.getElementById('cameraInput');
  const galleryInput = document.getElementById('galleryInput');
  const thumbGrid = document.getElementById('thumbGrid');
  const sendBtn = document.getElementById('sendBtn');
  const statusArea = document.getElementById('statusArea');
  const counter = document.getElementById('counter');

  let pendingFiles = []; // { file, dataUrl, el }
  let totalUploaded = 0;

  cameraBtn.addEventListener('click', () => cameraInput.click());
  galleryBtn.addEventListener('click', () => galleryInput.click());

  cameraInput.addEventListener('change', (e) => {
    addFiles(e.target.files);
    cameraInput.value = '';
  });

  galleryInput.addEventListener('change', (e) => {
    addFiles(e.target.files);
    galleryInput.value = '';
  });

  function addFiles(fileList) {
    for (const file of fileList) {
      const reader = new FileReader();
      const item = { file, dataUrl: null, el: null };
      reader.onload = (ev) => {
        item.dataUrl = ev.target.result;
        item.el = createThumb(item);
        thumbGrid.appendChild(item.el);
      };
      reader.readAsDataURL(file);
      pendingFiles.push(item);
    }
    updateSendBtn();
  }

  function createThumb(item) {
    const div = document.createElement('div');
    div.className = 'thumb-item';
    const img = document.createElement('img');
    img.src = item.dataUrl;
    div.appendChild(img);
    const removeBtn = document.createElement('button');
    removeBtn.className = 'thumb-remove';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => {
      pendingFiles = pendingFiles.filter(p => p !== item);
      div.remove();
      updateSendBtn();
    });
    div.appendChild(removeBtn);
    return div;
  }

  function updateSendBtn() {
    const hasPending = pendingFiles.length > 0;
    sendBtn.classList.toggle('hidden', !hasPending);
    sendBtn.disabled = !hasPending;
    sendBtn.textContent = '送信する（' + pendingFiles.length + '枚）';
  }

  sendBtn.addEventListener('click', async () => {
    if (pendingFiles.length === 0) return;
    sendBtn.disabled = true;
    const toUpload = [...pendingFiles];
    pendingFiles = [];
    showStatus('送信中... 0/' + toUpload.length, 'uploading');

    let successCount = 0;
    let errorCount = 0;

    for (let i = 0; i < toUpload.length; i++) {
      const item = toUpload[i];
      if (item.el) item.el.classList.add('uploading');
      showStatus('送信中... ' + (i + 1) + '/' + toUpload.length, 'uploading');

      try {
        var ext = (item.file.name.split('.').pop() || '').toLowerCase();
        var allowedExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'heic'];
        if (allowedExts.indexOf(ext) === -1) throw new Error('未対応の画像形式です');
        const storagePath = FOLDER + '/' + Date.now() + '_' + Math.random().toString(36).slice(2, 6) + '.' + ext;

        const { error: uploadErr } = await supabase.storage
          .from(BUCKET)
          .upload(storagePath, item.file, { contentType: item.file.type, upsert: false });
        if (uploadErr) throw uploadErr;

        // uploaded_images テーブルに登録
        const { error: insertErr } = await supabase
          .from('js_uploaded_images')
          .insert({ file_path: storagePath, file_name: item.file.name, source: SOURCE });
        if (insertErr) throw insertErr;

        if (item.el) {
          item.el.classList.remove('uploading');
          item.el.classList.add('uploaded');
          item.el.querySelector('.thumb-remove')?.remove();
          const check = document.createElement('span');
          check.className = 'thumb-check';
          check.textContent = '✅';
          item.el.appendChild(check);
        }
        successCount++;
      } catch (err) {
        console.error('Upload error:', err);
        if (item.el) item.el.classList.remove('uploading');
        errorCount++;
      }
    }

    totalUploaded += successCount;
    counter.classList.remove('hidden');
    counter.textContent = '送信済み合計: ' + totalUploaded + '枚';

    if (errorCount === 0) {
      showStatus(successCount + '枚 送信しました！', 'success');
    } else {
      showStatus(successCount + '枚 成功 / ' + errorCount + '枚 失敗', 'error');
    }

    updateSendBtn();
    // 3秒後にステータスを薄くする
    setTimeout(function() { statusArea.style.opacity = '0.6'; }, 3000);
  });

  function showStatus(msg, type) {
    statusArea.classList.remove('hidden', 'status-success', 'status-error', 'status-uploading');
    statusArea.classList.add('status-' + type);
    statusArea.textContent = msg;
    statusArea.style.opacity = '1';
  }
})();
</script>
</body>
</html>
