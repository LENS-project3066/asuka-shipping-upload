<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>5S安全パトロール</title>
<style>
  /* ── デザイントークン（抑制的モダン: 太字回避=weight≤500 / 角丸控えめ=4px中心） ── */
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --ink: #1d2128;
    --muted: #6c727c;
    --faint: #9aa0aa;
    --line: #e7e8ec;
    --line-2: #dcdee3;
    --accent: #4b5bd0;          /* 新規系の落ち着いたインディゴ */
    --accent-ink: #3f4cb5;
    --accent-weak: #eef0fb;
    --accent-line: #d6daf3;
    --violet: #7558b8;          /* フォロー系のミュートしたバイオレット */
    --violet-weak: #f2edf8;
    --danger: #d64545;
    --danger-weak: #fbecec;
    --danger-line: #ecc4c4;
    --ok: #2f9e5f;
    --ok-weak: #e8f5ee;
    --amber: #c2680f;
    --r: 4px;                   /* コントロール標準 */
    --r-card: 6px;              /* カード・面 */
    --shadow-sm: 0 1px 2px rgba(20,22,28,0.08);
    --shadow-pop: 0 6px 22px rgba(15,17,22,0.20);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    line-height: 1.5; letter-spacing: -0.003em;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  .container { max-width: 440px; margin: 0 auto; padding: 20px 16px 16px; }
  h1 { font-size: 19px; text-align: center; margin-bottom: 3px; font-weight: 500; letter-spacing: -0.01em; }
  .subtitle { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 22px; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12.5px; font-weight: 500; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.01em; }
  .form-select,
  .form-textarea,
  .form-input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line-2); border-radius: var(--r);
    font-size: 15px; background: var(--surface); color: var(--ink); font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-textarea { min-height: 84px; resize: vertical; }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--faint); }
  .form-select:focus, .form-textarea:focus, .form-input:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak);
  }

  .btn {
    padding: 12px 8px; border: none; border-radius: var(--r); font-size: 15px;
    font-weight: 500; cursor: pointer; text-align: center;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .btn-camera { flex: 1; background: var(--accent); color: #fff; }
  .btn-camera:active { background: var(--accent-ink); }
  .btn-gallery { flex: 1; background: var(--surface); color: var(--accent); border: 1px solid var(--accent-line); }
  .btn-gallery:active { background: var(--accent-weak); }
  input[type="file"] { display: none; }

  .photo-btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .photo-preview {
    width: 100%; aspect-ratio: 4/3; border: 1px dashed var(--line-2); border-radius: var(--r-card);
    display: flex; align-items: center; justify-content: center; color: var(--faint);
    font-size: 13px; overflow: hidden; position: relative; background: #fbfbfc;
  }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-remove {
    position: absolute; top: 8px; right: 8px; width: 32px; height: 32px;
    background: rgba(20,22,28,0.62); color: #fff; border: none; border-radius: 50%;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }

  .btn-send {
    display: block; width: 100%; padding: 14px; background: var(--ink); color: #fff;
    border: none; border-radius: var(--r); font-size: 15px; font-weight: 500;
    letter-spacing: 0.01em; cursor: pointer; margin-top: 10px; transition: background 0.15s;
  }
  .btn-send:active { background: #2c313d; }
  .btn-send:disabled { background: #cdd0d6; color: #fff; cursor: not-allowed; }

  .status { text-align: center; padding: 11px; font-size: 13.5px; font-weight: 500; border-radius: var(--r); margin-bottom: 12px; }
  .status-success { background: var(--ok-weak); color: var(--ok); }
  .status-error { background: var(--danger-weak); color: var(--danger); }
  .status-uploading { background: var(--accent-weak); color: var(--accent); }
  .hidden { display: none; }

  .counter { text-align: center; color: var(--muted); font-size: 13px; margin: 10px 0 0; }

  .location-chip { display: inline-block; padding: 4px 10px; background: var(--accent-weak); color: var(--accent); border-radius: var(--r); font-size: 12px; font-weight: 500; }
  .location-change { color: var(--muted); font-size: 12px; cursor: pointer; margin-left: 10px; text-decoration: underline; text-underline-offset: 2px; }
  .location-change:active { color: var(--accent); }

  /* タブ（セグメンテッドコントロール） */
  .tab-bar {
    display: flex; gap: 3px; margin-bottom: 18px; border-radius: var(--r-card);
    background: #ebedf0; padding: 3px;
  }
  .tab-btn {
    flex: 1; padding: 9px 0; border: none; font-size: 14px; font-weight: 500;
    cursor: pointer; text-align: center; transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    background: transparent; color: var(--muted); border-radius: var(--r);
  }
  .tab-btn.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
  .tab-btn:not(.active):active { color: var(--ink); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* フォロー: 指摘カード（状態間で枠を 1px 固定しレイアウトを揺らさない） */
  .finding-card {
    position: relative;
    display: flex; gap: 12px; padding: 12px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .finding-card:active { background: #f6f7f9; }
  .finding-card.selected { border-color: var(--violet); background: var(--violet-weak); box-shadow: 0 0 0 1px var(--violet); }
  /* 完了カード: 閲覧は可能（タップで Before/After を確認できる）。
     色の薄化で完了状態を視覚的に表現。 */
  .finding-card.done { border-color: var(--line); background: #f8f9fa; }
  .finding-card.done .finding-thumb { opacity: 0.5; }
  .finding-card.done .finding-comment { color: var(--faint); }
  .finding-card.done .finding-workplace { color: #a99bc7; }
  .finding-thumb { width: 80px; height: 60px; border-radius: var(--r); object-fit: cover; background: #eef0f2; flex-shrink: 0; }
  .finding-info { flex: 1; min-width: 0; }
  .finding-workplace { font-size: 12px; font-weight: 500; color: var(--violet); margin-bottom: 3px; }
  .finding-comment { font-size: 13px; color: #4b5159; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .finding-date { font-size: 11px; color: var(--faint); margin-top: 3px; }
  .finding-done-badge { font-size: 11px; color: var(--ok); font-weight: 500; }
  /* 取消ボタン: カード右下に絶対配置。カードクリック(閲覧)と区別しやすく赤系で。 */
  .finding-reset-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    padding: 4px 10px;
    font-size: 11px;
    border: 1px solid var(--danger-line);
    border-radius: var(--r);
    background: var(--surface);
    color: var(--danger);
    cursor: pointer;
    font-weight: 500;
  }
  .finding-reset-btn:active { background: var(--danger-weak); }

  /* Before/After 閲覧オーバーレイ */
  .photo-view-overlay {
    position: fixed; inset: 0;
    background: rgba(15, 17, 22, 0.66);
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
    z-index: 1000;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px 12px;
    overflow-y: auto;
  }
  .photo-view-dialog {
    background: var(--surface);
    border-radius: var(--r-card);
    padding: 16px 16px 20px;
    max-width: 440px;
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-pop);
  }
  .photo-view-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: #eef0f2;
    color: var(--muted);
    font-size: 17px;
    cursor: pointer;
    line-height: 1;
  }
  .photo-view-close:active { background: #dfe2e6; }
  .photo-view-title { font-size: 14px; font-weight: 500; color: var(--violet); padding-right: 40px; }
  .photo-view-date { font-size: 11px; color: var(--faint); margin-top: 2px; }
  .photo-view-comment { font-size: 13px; color: #4b5159; margin-top: 8px; white-space: pre-wrap; }
  .photo-view-label { font-size: 12px; font-weight: 500; color: var(--muted); margin: 14px 0 6px; }
  .photo-view-img { width: 100%; border-radius: var(--r); display: block; }
  .empty-msg { text-align: center; color: var(--faint); font-size: 14px; padding: 40px 0; }

  .follow-form { border-top: 1px solid var(--line); padding-top: 18px; margin-top: 10px; }
  .before-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 5px; }
  .before-photo { width: 100%; border-radius: var(--r-card); margin-bottom: 14px; }

  /* 送信待ちキュー バナー (画面下部固定)。
     楽観 write-behind: 撮影は即フォームをクリアし、裏で直列アップロード。
     その進捗をここに表示する。pending=0 で自動的に隠れる。 */
  .queue-banner {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 14px; width: calc(100% - 24px); max-width: 416px;
    background: #23262e; color: #fff; border-radius: var(--r-card);
    padding: 11px 14px; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow-pop); z-index: 900;
  }
  .queue-banner.hidden { display: none; }
  .queue-banner.error { background: #b23b3b; }
  .queue-banner.offline { background: #5a5048; }
  .qb-text { flex: 1; min-width: 0; }
  .qb-spin {
    width: 15px; height: 15px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    border-radius: 50%; animation: qbspin 0.8s linear infinite;
  }
  .qb-spin.hidden { display: none; }
  @keyframes qbspin { to { transform: rotate(360deg); } }
  .qb-retry {
    flex-shrink: 0; padding: 5px 12px; border: 1px solid rgba(255,255,255,0.55);
    border-radius: var(--r); background: transparent; color: #fff;
    font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .qb-retry:active { background: rgba(255,255,255,0.15); }
  .qb-retry.hidden { display: none; }

  /* フォロー: 送信待ち(楽観完了)カード。✓フォロー済みとは別の淡色で区別。 */
  .finding-pending-badge { font-size: 11px; color: var(--amber); font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 5S安全パトロール</h1>
  <p class="subtitle" id="pageSubtitle">指摘登録 & フォロー</p>

        <button class="btn-send" id="followSendBtn" disabled>フォローを送信</button>

    </div>

    <!-- ============================== -->

    <div class="tab-content" id="tabNew">

          <button class="btn btn-gallery" id="newGalleryBtn">🖼 写真を選ぶ</button>
        </div>
        <input type="file" id="newCameraInput" accept="image/*" capture="environment">
        <input type="file" id="newGalleryInput" accept="image/*">
        <div class="photo-preview" id="newPhotoPreview">写真を撮影または選択</div>
      </div>

      <div class="status hidden" id="newStatus"></div>
      <button class="btn-send" id="newSendBtn" disabled>送信する</button>
      <div class="counter hidden" id="newCounter"></div>
    </div>
  </div>
</div>

<!-- 送信待ちキュー バナー (画面下部固定・pending>0 のとき表示) -->
<div class="queue-banner hidden" id="queueBanner">
  <div class="qb-spin hidden" id="qbSpin"></div>
  <div class="qb-text" id="qbText"></div>

    findingList.innerHTML = '<div class="empty-msg">読み込み中...</div>';
    followForm.classList.add('hidden');
    selectedFindingId = null;

    // 対象月セレクタの値で指摘を絞り込む (デフォルトは先月)
    const monthVal = followMonthInput.value;
    if (!monthVal) return;
    const [y, m] = monthVal.split('-').map(Number);
    const dateFrom = `${y}-${String(m).padStart(2, '0')}-01`;
    const lastDay = new Date(y, m, 0).getDate();
    const dateTo = `${y}-${String(m).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

    const { data, error } = await supabase
      .from('js_safety_findings')
      .select('id, patrol_date, location, workplace_id, comment, before_photo_path, after_photo_path, dismissed_at')
      .eq('location', location)
      .gte('patrol_date', dateFrom)
      .lte('patrol_date', dateTo)
      .is('dismissed_at', null)
      .order('patrol_date')
      .order('workplace_id');

    if (error) { findingList.innerHTML = '<div class="empty-msg">読込エラー</div>'; return; }

    const { data: wps } = await supabase.from('js_safety_workplaces').select('id, name').eq('location', location);
    const wpMap = {};
    (wps || []).forEach(w => { wpMap[w.id] = w.name; });

    findings = (data || []).map(f => ({
      ...f,
      workplace_name: wpMap[f.workplace_id] || '不明',
      before_url: f.before_photo_path ? getPublicUrl(f.before_photo_path) : null,
      before_thumb_url: f.before_photo_path ? getThumbUrl(f.before_photo_path, 200) : null,
      isDone: !!f.after_photo_path
    }));
    renderFindingList();
  }

  function getPublicUrl(path) {
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
  }

  // Supabase Image Transform (Pro プラン以上で使用可)。サムネ取得の高速化用。
  // 原寸が必要な箇所 (Before 写真の大表示・Electron 側) は getPublicUrl を使う。
  function getThumbUrl(path, width) {
    return `${SUPABASE_URL}/storage/v1/render/image/public/${BUCKET}/${path}?width=${width}&quality=60&resize=cover`;
  }

  function renderFindingList() {
    // 未送信(キュー滞留)のフォローも完了扱いにする(二重フォロー防止 + 楽観表示)
    const pending = pendingFollowIds();
    findings.forEach(f => {
      f._pendingFollow = pending.has(f.id) && !f.after_photo_path;
      f.isDone = !!f.after_photo_path || f._pendingFollow;
    });
    const undone = findings.filter(f => !f.isDone);
    const done = findings.filter(f => f.isDone);

    if (findings.length === 0) {
      findingList.innerHTML = '<div class="empty-msg">この月の指摘がありません</div>';
      return;
    }
    findingList.innerHTML = '';

    if (undone.length === 0) {
      const msg = document.createElement('div');
      msg.className = 'empty-msg';
      msg.textContent = '全件フォロー完了!';
      findingList.appendChild(msg);
    }

    undone.forEach(f => findingList.appendChild(createCard(f, false)));
    done.forEach(f => findingList.appendChild(createCard(f, true)));
  }

  function createCard(f, isDone) {
    const card = document.createElement('div');
    card.className = 'finding-card' + (isDone ? ' done' : '') + (f.id === selectedFindingId ? ' selected' : '');
    card.innerHTML = `
      ${f.before_thumb_url ? `<img class="finding-thumb" src="${f.before_thumb_url}" alt="" loading="lazy">` : '<div class="finding-thumb"></div>'}
      <div class="finding-info">
        <div class="finding-workplace">${esc(f.workplace_name)}</div>
        <div class="finding-comment">${esc(f.comment || '')}</div>
        <div class="finding-date">${esc(f.patrol_date)}${isDone ? (f._pendingFollow ? ' <span class="finding-pending-badge">⏳ 送信待ち</span>' : ' <span class="finding-done-badge">✓ フォロー済み</span>') : ''}</div>
      </div>
      ${isDone ? `<button class="finding-reset-btn" data-reset-id="${f.id}" title="${f._pendingFollow ? '送信待ちのフォローを取り消す' : '対象違いの写真をアップした時の取消'}">↺ 取消</button>` : ''}
    `;
    // カードクリック: 未完了 → 選択してフォロー画面へ / 完了 → Before/After 閲覧
    card.addEventListener('click', () => {
      if (isDone) showFindingPhotos(f);
      else selectFinding(f);
    });
    // done カードの「↺ 取消」ボタン
    const resetBtn = card.querySelector('.finding-reset-btn');
    if (resetBtn) {
      resetBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(resetBtn.dataset.resetId);
        if (!id) return;

        // 送信待ち(まだアップロードされていない)フォローはキューから取り消すだけ
        if (f._pendingFollow) {
          if (!confirm('送信待ちのフォローを取り消して撮り直しますか？')) return;
          const items = queueItems.filter(i => i.type === 'follow' && i.finding_id === id);
          for (const i of items) await discardItem(i); // アップ済みなら Storage も掃除
          await refreshQueueMirror();
          renderFindingList();
          return;
        }

        if (!confirm('このAfter写真を取り消して撮り直しますか？\n（対象違いの写真をアップしてしまった時の救済用）')) return;
        try {
          const { error } = await supabase
            .from('js_safety_findings')
            .update({ after_photo_path: null, followed_at: null, follow_comment: null })
            .eq('id', id);
          if (error) throw error;
          await loadFindings(currentLocation);
        } catch (err) {
          alert('取消失敗: ' + (err.message || err));
        }
      });
    }
    return card;
  }

  // 完了済みカードの Before/After 閲覧オーバーレイ
  function showFindingPhotos(f) {
    document.querySelector('.photo-view-overlay')?.remove();
    const afterUrl = f.after_photo_path ? getPublicUrl(f.after_photo_path) : null;
    const overlay = document.createElement('div');
    overlay.className = 'photo-view-overlay';
    overlay.innerHTML = `
      <div class="photo-view-dialog">
        <button class="photo-view-close" aria-label="閉じる">✕</button>
        <div class="photo-view-title">${esc(f.workplace_name || '')}</div>
        <div class="photo-view-date">${esc(f.patrol_date)}</div>
        <div class="photo-view-comment">${esc(f.comment || '')}</div>
        <div class="photo-view-label">📷 Before</div>
        <img class="photo-view-img" src="${f.before_url || ''}" alt="before">
        ${afterUrl ? `<div class="photo-view-label">✅ After</div><img class="photo-view-img" src="${afterUrl}" alt="after">` : ''}
      </div>
    `;
    // 背景クリックで閉じる（ダイアログ内クリックは伝播させない）
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.remove();
    });
    overlay.querySelector('.photo-view-close').addEventListener('click', () => overlay.remove());
    document.body.appendChild(overlay);
  }

  function selectFinding(f) {
    selectedFindingId = f.id;
    followFile = null;
    followCameraInput.value = '';
    followGalleryInput.value = '';
    followPhotoPreview.innerHTML = 'After写真を撮影または選択';
    followStatus.classList.add('hidden');
    updateFollowSendBtn();

    findingList.querySelectorAll('.finding-card').forEach(c => c.classList.remove('selected'));
    const undone = findings.filter(x => !x.isDone);
    const cards = findingList.querySelectorAll('.finding-card:not(.done)');
    cards.forEach((c, i) => { if (undone[i] && undone[i].id === f.id) c.classList.add('selected'); });

    beforePhoto.src = f.before_url || '';
    followForm.classList.remove('hidden');
    setTimeout(() => followForm.scrollIntoView({ behavior: 'smooth' }), 100);
  }

  function updateFollowSendBtn() {
    followSendBtn.disabled = !(selectedFindingId && followFile);
  }

  // 楽観 write-behind: アップロード完了を待たず即キューに積み、フォロー画面を閉じる。
  // 実アップロード(Storage→DB update)は drainQueue が裏で直列実行する。
  async function submitFollow() {
    if (!selectedFindingId || !followFile) return;
    const findingId = selectedFindingId;
    const f = findings.find(x => x.id === findingId);

    try {
      await enqueueUpload({
        type: 'follow',
        finding_id: findingId,
        workplace_name: f ? f.workplace_name : '',
        comment: f ? f.comment : '',
        blob: followFile,
        contentType: followFile.type,
        ext: (followFile.name.split('.').pop() || 'jpg').toLowerCase(),
      });
    } catch (e) {
      showStatusEl(followStatus, '保存に失敗しました。もう一度お試しください', 'error');
      return;
    }

    // 楽観的に完了表示にして次のカードへ即進める
    if (f) f.isDone = true;
    selectedFindingId = null;
    followFile = null;
    followForm.classList.add('hidden');
    followStatus.classList.add('hidden');
    renderFindingList();
  }

  // ========================================
  // 新規指摘タブ
  // ========================================

  async function loadWorkplaces(location) {
    workplaceSelect.innerHTML = '<option value="">読み込み中...</option>';
    const { data, error } = await supabase
      .from('js_safety_workplaces').select('id, name')
      .eq('location', location).eq('is_active', true).order('sort_order');

    if (error) { workplaceSelect.innerHTML = '<option value="">読込失敗</option>'; return; }

    workplaceSelect.innerHTML = '<option value="">-- 選択してください --</option>' +
      (data || []).map(w => `<option value="${w.id}">${w.name}</option>`).join('');

    const lastId = localStorage.getItem('safetyPatrolLastWorkplace');
    if (lastId && (data || []).some(w => String(w.id) === String(lastId))) workplaceSelect.value = lastId;
    updateNewSendBtn();
  }

  function updateNewSendBtn() {
    newSendBtn.disabled = !(workplaceSelect.value && commentInput.value.trim() && newFile);
  }

  // 楽観 write-behind: アップロード完了を待たず即キューに積み、フォームを空にして
  // 次の撮影へ進める。実アップロード(Storage→DB insert)は drainQueue が裏で直列実行。
  // patrol_date は「キューに積んだ瞬間」(=撮影時刻) で固定する。
  async function submitNew() {
    if (!newFile || !workplaceSelect.value || !commentInput.value.trim()) return;

    const today = new Date();
    const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

    try {
      await enqueueUpload({
        type: 'new',
        location: currentLocation,
        patrol_date: dateStr,
        workplace_id: parseInt(workplaceSelect.value, 10),
        comment: commentInput.value.trim(),
        blob: newFile,
        contentType: newFile.type,
        ext: (newFile.name.split('.').pop() || 'jpg').toLowerCase(),
      });
    } catch (e) {
      showStatusEl(newStatus, '保存に失敗しました。もう一度お試しください', 'error');
      return;
    }

    totalSubmitted++;
    newCounter.classList.remove('hidden');
    newCounter.textContent = `本日の登録件数: ${totalSubmitted}件`;

    // フォームを即クリア(職場は連続入力のため残す)
    commentInput.value = '';
    newFile = null;
    newCameraInput.value = '';
    newGalleryInput.value = '';
    newPhotoPreview.innerHTML = '写真を撮影または選択';
    newStatus.classList.add('hidden');
    updateNewSendBtn();
  }

  // ========================================
  // 送信待ちキュー (IndexedDB 永続 + 直列 drain)
  // ========================================
  // 通信が悪くても撮影を妨げないための楽観 write-behind。送信ボタンで写真Blobと
  // メタを IndexedDB に積み(=永続)、フォームを即解放。裏で drainQueue が古い順に
  // 1件ずつ Storage アップロード→DB 書込み→キュー削除。ページを閉じても未送信分は
  // 残り、次回起動時に自動で送信再開する。

  const QUEUE_DB = 'safetyPatrolQueue';
  const QUEUE_STORE = 'uploads';
  const MAX_RETRY = 5; // これを超えたら「送信できない」失敗確定。自動再試行を止め人手(再送/破棄)に委ねる
  let _qdb = null;

  function openQueueDB() {
    if (_qdb) return Promise.resolve(_qdb);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(QUEUE_DB, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(QUEUE_STORE)) db.createObjectStore(QUEUE_STORE, { keyPath: 'id' });
      };
      req.onsuccess = () => { _qdb = req.result; resolve(_qdb); };
      req.onerror = () => reject(req.error);
    });
  }

  function idbTx(mode, fn) {
    return openQueueDB().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(QUEUE_STORE, mode);
      const store = tx.objectStore(QUEUE_STORE);
      let result;
      const r = fn(store);
      if (r) r.onsuccess = () => { result = r.result; };
      tx.oncomplete = () => resolve(result);
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    }));
  }

  const idbPut = (item) => idbTx('readwrite', s => s.put(item));
  const idbDelete = (id) => idbTx('readwrite', s => s.delete(id));
  const idbGetAll = () => idbTx('readonly', s => s.getAll());

  function genId() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
  }

  // フォームから1件キューに積む。storagePath は item の UUID から決定論的に作る
  // (リトライで二重発番しない + アイテム間で衝突しない=upsert で別写真を上書きしない)。
  async function enqueueUpload(payload) {
    const id = genId();
    const item = {
      id,
      createdAt: new Date().toISOString(),
      storagePath: `${FOLDER}/${id}.${payload.ext}`,
      storageUploaded: false,
      retryCount: 0,
      lastError: null,
      ...payload,
    };
    await idbPut(item);
    await refreshQueueMirror();
    drainQueue();
  }

  async function refreshQueueMirror() {
    try { queueItems = await idbGetAll() || []; }
    catch (e) { queueItems = []; }
    renderQueueBanner();
  }

  // 古い順に1件ずつ処理。失敗は retryCount++ で残し、次の item へ進む(毒入り1件で
  // 全体を止めない)。MAX_RETRY 到達分はもう叩かず(失敗確定)、人手の再送/破棄を待つ。
  // まだ再試行余地のある失敗が出たらバックオフ後に再試行。
  async function drainQueue() {
    if (draining || !navigator.onLine) { renderQueueBanner(); return; }
    draining = true;
    renderQueueBanner();
    let willRetry = false;
    let followDone = false;
    try {
      const items = (await idbGetAll() || []).sort((a, b) => (a.createdAt < b.createdAt ? -1 : 1));
      for (const item of items) {
        if ((item.retryCount || 0) >= MAX_RETRY) continue; // 失敗確定は素通り
        try {
          await processQueueItem(item);
          await idbDelete(item.id);
          markUploaded(item);
          if (item.type === 'follow') followDone = true;
        } catch (err) {
          item.retryCount = (item.retryCount || 0) + 1;
          item.lastError = err && err.message ? err.message : String(err);
          await idbPut(item);
          if (item.retryCount < MAX_RETRY) willRetry = true; // まだ再試行する
        }
        await refreshQueueMirror();
      }
    } finally {
      draining = false;
    }
    renderQueueBanner();
    // 送信完了でフォローカードのバッジ(⏳送信待ち→✓フォロー済み)を更新
    if (followDone && findings.length) renderFindingList();
    if (willRetry) scheduleRetry();
  }

  // drain 成功後、メモリ上の findings も確定状態へ寄せる。これをやらないと
  // キューから消えた直後の再描画で after_photo_path=null に戻りカードが未完了化する。
  function markUploaded(item) {
    if (item.type !== 'follow') return;
    const f = findings.find(x => x.id === item.finding_id);
    if (f) { f.after_photo_path = item.storagePath; f.isDone = true; f._pendingFollow = false; }
  }

  async function processQueueItem(item) {
    // Phase1: Storage アップロード。部分成功後のリトライで二重にならないよう
    // storageUploaded フラグ + upsert:true。
    if (!item.storageUploaded) {
      const { error: upErr } = await supabase.storage.from(BUCKET)
        .upload(item.storagePath, item.blob, { contentType: item.contentType, upsert: true });
      if (upErr) throw upErr;
      item.storageUploaded = true;
      await idbPut(item);
    }
    // Phase2: DB 書込み
    if (item.type === 'new') {
      // 二重 insert 防止: storagePath は item 固有なので自然キーになる。
      // 「アップ成功・insert 応答だけ消失」でリトライしても重複行を作らない。
      const { data: existing } = await supabase
        .from('js_safety_findings').select('id').eq('before_photo_path', item.storagePath).limit(1);
      if (!existing || existing.length === 0) {
        const { error } = await supabase.from('js_safety_findings').insert({
          patrol_date: item.patrol_date,
          location: item.location,
          workplace_id: item.workplace_id,
          comment: item.comment,
          before_photo_path: item.storagePath,
          created_by: 'mobile',
        });
        if (error) throw error;
      }
    } else {
      // 先勝ち: 既に After がある行には書かない(二重フォローの後勝ち上書き防止)。
      // 却下済み(dismissed_at)にも書かない。0 行一致でも error にはならず冪等に成功扱い。
      const { error } = await supabase.from('js_safety_findings').update({
        after_photo_path: item.storagePath,
        follow_comment: null,
        followed_at: new Date().toISOString(),
      }).eq('id', item.finding_id).is('after_photo_path', null).is('dismissed_at', null);
      if (error) throw error;
    }
  }

  function scheduleRetry() {
    if (retryTimer) return;
    retryTimer = setTimeout(() => { retryTimer = null; drainQueue(); }, 8000);
  }

  function renderQueueBanner() {
    const n = queueItems.length;
    if (n === 0) { queueBanner.classList.add('hidden'); return; }
    queueBanner.classList.remove('hidden');
    const failed = queueItems.filter(i => (i.retryCount || 0) >= MAX_RETRY).length;
    const pending = n - failed;
    const retrying = queueItems.some(i => { const r = i.retryCount || 0; return r > 0 && r < MAX_RETRY; });

    queueBanner.classList.toggle('offline', !navigator.onLine && failed === 0);
    queueBanner.classList.toggle('error', failed > 0 || (navigator.onLine && retrying));

    let text;
    if (failed > 0) text = `✕ 送信できない ${failed}件${pending ? ` / 送信待ち ${pending}件` : ''}`;
    else if (!navigator.onLine) text = `📴 オフライン — 送信待ち ${n}件（接続後に自動送信）`;
    else if (draining) text = `📤 送信中… 残り ${n}件`;
    else if (retrying) text = `⚠️ 送信待ち ${n}件（自動で再送します）`;
    else text = `📤 送信待ち ${n}件`;
    qbText.textContent = text;

    qbSpin.classList.toggle('hidden', !(draining && navigator.onLine));
    // 再送: オンラインで(失敗 or リトライ中)かつ drain 停止中。破棄: 失敗確定がある時だけ。
    qbRetry.classList.toggle('hidden', !(navigator.onLine && (failed > 0 || retrying) && !draining));
    qbDiscard.classList.toggle('hidden', failed === 0);
  }

  // 1件破棄。アップロード済みなら Storage の孤児ファイルを best-effort で掃除する。
  async function discardItem(item) {
    if (item.storageUploaded) {
      try { await supabase.storage.from(BUCKET).remove([item.storagePath]); } catch (e) { /* best-effort */ }
    }
    await idbDelete(item.id);
  }

  // 「今すぐ再送」: 失敗/リトライ中の retryCount を 0 に戻して(IDBにも反映)再 drain。
  async function retryFailed() {
    const items = await idbGetAll() || [];
    for (const it of items) {
      if ((it.retryCount || 0) > 0) { it.retryCount = 0; it.lastError = null; await idbPut(it); }
    }
    await refreshQueueMirror();
    drainQueue();
  }

  // 「破棄」: 送信できない確定分を Storage 掃除つきで捨てる。
  async function discardFailed() {
    const items = (await idbGetAll() || []).filter(i => (i.retryCount || 0) >= MAX_RETRY);
    if (!items.length) return;
    const detail = items.slice(0, 3).map(i => '・' + (i.lastError || '不明なエラー')).join('\n');
    if (!confirm(`送信できない ${items.length}件を破棄しますか？\n${detail}\n\n破棄すると、この写真は送信されません。`)) return;
    for (const it of items) await discardItem(it);
    await refreshQueueMirror();
    if (findings.length) renderFindingList();
  }

  // フォローが未送信(キュー滞留)の finding id 集合。フォロー一覧で楽観的に
  // 「完了(送信待ち)」表示し、再選択による二重フォローを防ぐ。
  function pendingFollowIds() {
    return new Set(queueItems.filter(i => i.type === 'follow').map(i => i.finding_id));
  }

  // ========================================
  // 共通ユーティリティ
  // ========================================

  function handlePhoto(file, mode) {
    if (!file) return;
    const preview = mode === 'follow' ? followPhotoPreview : newPhotoPreview;
    const cameraInput = mode === 'follow' ? followCameraInput : newCameraInput;
    const galleryInput = mode === 'follow' ? followGalleryInput : newGalleryInput;

    if (mode === 'follow') followFile = file;
    else newFile = file;

    const reader = new FileReader();
    reader.onload = (e) => {
      preview.innerHTML = `<img src="${e.target.result}" alt="preview"><button class="photo-remove">✕</button>`;
      preview.querySelector('.photo-remove').addEventListener('click', () => {
        if (mode === 'follow') followFile = null;
        else newFile = null;
        cameraInput.value = '';
        galleryInput.value = '';
        preview.innerHTML = mode === 'follow' ? 'After写真を撮影または選択' : '写真を撮影または選択';
        if (mode === 'follow') updateFollowSendBtn();
        else updateNewSendBtn();
      });
    };
    reader.readAsDataURL(file);
    if (mode === 'follow') updateFollowSendBtn();
    else updateNewSendBtn();
  }

  function showStatusEl(el, msg, type) {
    el.className = `status status-${type}`;
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
