<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>5S安全パトロール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }
  .container { max-width: 440px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; text-align: center; margin-bottom: 4px; font-weight: 600; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .form-select,
  .form-textarea,
  .form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fff; font-family: inherit; }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-select:focus, .form-textarea:focus, .form-input:focus { outline: none; border-color: #1976d2; }

  .btn { padding: 14px 8px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
  .btn-camera { flex: 1; background: #1976d2; color: #fff; }
  .btn-camera:active { background: #1565c0; }
  .btn-gallery { flex: 1; background: #fff; color: #1976d2; border: 2px solid #1976d2; }
  .btn-gallery:active { background: #e3f2fd; }
  input[type="file"] { display: none; }

  .photo-btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .photo-preview { width: 100%; aspect-ratio: 4/3; border: 2px dashed #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; overflow: hidden; position: relative; background: #fafafa; }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-remove { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; background: rgba(0,0,0,0.7); color: #fff; border: none; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .btn-send { display: block; width: 100%; padding: 16px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .btn-send:active { background: #388e3c; }
  .btn-send:disabled { background: #bbb; cursor: not-allowed; }

  .status { text-align: center; padding: 12px; font-size: 14px; border-radius: 6px; margin-bottom: 12px; }
  .status-success { background: #e8f5e9; color: #2e7d32; }
  .status-error { background: #ffebee; color: #e53935; }
  .status-uploading { background: #e3f2fd; color: #1976d2; }
  .hidden { display: none; }

  .counter { text-align: center; color: #888; font-size: 13px; margin: 8px 0; }

  .location-chip { display: inline-block; padding: 4px 12px; background: #e3f2fd; color: #1976d2; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
  .location-change { text-decoration: underline; color: #1976d2; font-size: 12px; cursor: pointer; margin-left: 8px; }

  /* タブ */
  .tab-bar {
    display: flex; gap: 0; margin-bottom: 16px; border-radius: 10px; overflow: hidden;
    border: 2px solid #1976d2;
  }
  .tab-btn {
    flex: 1; padding: 12px 0; border: none; font-size: 14px; font-weight: 700;
    cursor: pointer; text-align: center; transition: all 0.15s;
    background: #fff; color: #1976d2;
  }
  .tab-btn.active { background: #1976d2; color: #fff; }
  .tab-btn:not(.active):active { background: #e3f2fd; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* フォロー: 指摘カード */
  .finding-card {
    position: relative;
    display: flex; gap: 12px; padding: 12px; margin-bottom: 8px;
    background: #fff; border: 2px solid #ddd; border-radius: 10px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .finding-card:active { background: #f0f0f0; }
  .finding-card.selected { border-color: #7b1fa2; background: #f3e5f9; }
  /* 完了カード: 閲覧は可能（タップで Before/After を確認できる）。
     色の薄化で完了状態を視覚的に表現。 */
  .finding-card.done { border-color: #ddd; background: #fafafa; color: #bbb; }
  .finding-card.done .finding-thumb { opacity: 0.5; }
  .finding-card.done .finding-comment { color: #aaa; }
  .finding-thumb { width: 80px; height: 60px; border-radius: 6px; object-fit: cover; background: #eee; flex-shrink: 0; }
  .finding-info { flex: 1; min-width: 0; }
  .finding-workplace { font-size: 12px; font-weight: 600; color: #7b1fa2; margin-bottom: 2px; }
  .finding-comment { font-size: 13px; color: #555; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .finding-date { font-size: 11px; color: #999; margin-top: 2px; }
  .finding-done-badge { font-size: 11px; color: #2e7d32; font-weight: 600; }
  /* 取消ボタン: カード右下に絶対配置。カードクリック(閲覧)と区別しやすく赤系で。 */
  .finding-reset-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    padding: 4px 12px;
    font-size: 11px;
    border: 1px solid #d32f2f;
    border-radius: 4px;
    background: #fff;
    color: #d32f2f;
    cursor: pointer;
    font-weight: 600;
  }
  .finding-reset-btn:active { background: #ffebee; }

  /* Before/After 閲覧オーバーレイ */
  .photo-view-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 1000;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px 12px;
    overflow-y: auto;
  }
  .photo-view-dialog {
    background: #fff;
    border-radius: 12px;
    padding: 16px 16px 20px;
    max-width: 440px;
    width: 100%;
    position: relative;
  }
  .photo-view-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: #eee;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .photo-view-close:active { background: #ccc; }
  .photo-view-title { font-size: 14px; font-weight: 600; color: #7b1fa2; padding-right: 40px; }
  .photo-view-date { font-size: 11px; color: #999; margin-top: 2px; }
  .photo-view-comment { font-size: 13px; color: #555; margin-top: 8px; white-space: pre-wrap; }
  .photo-view-label { font-size: 12px; font-weight: 600; color: #555; margin: 14px 0 6px; }
  .photo-view-img { width: 100%; border-radius: 8px; display: block; }
  .empty-msg { text-align: center; color: #999; font-size: 14px; padding: 40px 0; }

  .follow-form { border-top: 2px solid #7b1fa2; padding-top: 16px; margin-top: 8px; }
  .before-label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .before-photo { width: 100%; border-radius: 8px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 5S安全パトロール</h1>
  <p class="subtitle" id="pageSubtitle">指摘登録 & フォロー</p>

  <!-- 拠点選択画面 -->
  <div id="locationScreen">
    <div class="form-group">
      <label class="form-label">拠点を選択</label>
      <button class="btn btn-camera" style="width:100%; margin-bottom:8px;" data-location="honsha">🏢 本社</button>
      <button class="btn btn-camera" style="width:100%;" data-location="kitahora">🏭 北洞</button>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="mainScreen" class="hidden">
    <div style="margin-bottom: 12px;">
      <span class="location-chip" id="locationChip">本社</span>
      <a class="location-change" id="changeLocationBtn">拠点を変える</a>
    </div>

    <!-- タブバー -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="follow">🔄 フォロー</button>
      <button class="tab-btn" data-tab="new">📷 新規指摘</button>
    </div>

    <!-- ============================== -->
    <!-- フォロータブ -->
    <!-- ============================== -->
    <div class="tab-content active" id="tabFollow">
      <div class="form-group" style="margin-bottom:10px;">
        <label class="form-label" for="followMonthInput">対象月</label>
        <input type="month" class="form-input" id="followMonthInput">
      </div>
      <div class="finding-list" id="findingList">
        <div class="empty-msg">読み込み中...</div>
      </div>

      <div id="followForm" class="follow-form hidden">
        <div class="before-label">Before写真</div>
        <img class="before-photo" id="beforePhoto" src="" alt="before">

        <div class="photo-area">
          <label class="form-label">After写真 <span style="color:#e53935;">*</span></label>
          <div class="photo-btn-row">
            <button class="btn btn-camera" id="followCameraBtn">📷 撮影</button>
            <button class="btn btn-gallery" id="followGalleryBtn">🖼 写真を選ぶ</button>
          </div>
          <input type="file" id="followCameraInput" accept="image/*" capture="environment">
          <input type="file" id="followGalleryInput" accept="image/*">
          <div class="photo-preview" id="followPhotoPreview">After写真を撮影または選択</div>
        </div>

        <div class="status hidden" id="followStatus"></div>
        <button class="btn-send" id="followSendBtn" disabled>フォローを送信</button>
      </div>
    </div>

    <!-- ============================== -->
    <!-- 新規指摘タブ -->
    <!-- ============================== -->
    <div class="tab-content" id="tabNew">
      <div class="form-group">
        <label class="form-label">職場 <span style="color:#e53935;">*</span></label>
        <select class="form-select" id="workplaceSelect">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">指摘内容 <span style="color:#e53935;">*</span></label>
        <textarea class="form-textarea" id="commentInput" placeholder="例: 通路に段ボールが積み上げられている"></textarea>
      </div>

      <div class="photo-area">
        <label class="form-label">写真 <span style="color:#e53935;">*</span></label>
        <div class="photo-btn-row">
          <button class="btn btn-camera" id="newCameraBtn">📷 撮影</button>
          <button class="btn btn-gallery" id="newGalleryBtn">🖼 写真を選ぶ</button>
        </div>
        <input type="file" id="newCameraInput" accept="image/*" capture="environment">
        <input type="file" id="newGalleryInput" accept="image/*">
        <div class="photo-preview" id="newPhotoPreview">写真を撮影または選択</div>
      </div>

      <div class="status hidden" id="newStatus"></div>
      <button class="btn-send" id="newSendBtn" disabled>送信する</button>
      <div class="counter hidden" id="newCounter"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function() {
  const SUPABASE_URL = 'https://imunxfojosnpoohbkuyd.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltdW54Zm9qb3NucG9vaGJrdXlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxODAyNzIsImV4cCI6MjA3ODc1NjI3Mn0.5opdeiZ-eAboMERcZKwD3F1K8Mrd8tu7v6D8f41qIS8';
  const BUCKET = 'quality-docs';
  const FOLDER = 'safety-patrol';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 共通DOM
  const locationScreen = document.getElementById('locationScreen');
  const mainScreen = document.getElementById('mainScreen');
  const locationChip = document.getElementById('locationChip');
  const changeLocationBtn = document.getElementById('changeLocationBtn');

  // フォロータブDOM
  const followMonthInput = document.getElementById('followMonthInput');
  const findingList = document.getElementById('findingList');
  const followForm = document.getElementById('followForm');
  const beforePhoto = document.getElementById('beforePhoto');
  const followCameraBtn = document.getElementById('followCameraBtn');
  const followGalleryBtn = document.getElementById('followGalleryBtn');
  const followCameraInput = document.getElementById('followCameraInput');
  const followGalleryInput = document.getElementById('followGalleryInput');
  const followPhotoPreview = document.getElementById('followPhotoPreview');
  const followSendBtn = document.getElementById('followSendBtn');
  const followStatus = document.getElementById('followStatus');

  // 新規タブDOM
  const workplaceSelect = document.getElementById('workplaceSelect');
  const commentInput = document.getElementById('commentInput');
  const newCameraBtn = document.getElementById('newCameraBtn');
  const newGalleryBtn = document.getElementById('newGalleryBtn');
  const newCameraInput = document.getElementById('newCameraInput');
  const newGalleryInput = document.getElementById('newGalleryInput');
  const newPhotoPreview = document.getElementById('newPhotoPreview');
  const newSendBtn = document.getElementById('newSendBtn');
  const newStatus = document.getElementById('newStatus');
  const newCounter = document.getElementById('newCounter');

  // 状態
  let currentLocation = null;
  let findings = [];
  let selectedFindingId = null;
  let followFile = null;
  let newFile = null;
  let totalSubmitted = 0;

  init();

  function init() {
    // フォロー: 対象月のデフォルトは先月 (showMain → loadFindings が値を参照するので最初にセット)
    const now = new Date();
    const defaultFollow = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    followMonthInput.value = `${defaultFollow.getFullYear()}-${String(defaultFollow.getMonth() + 1).padStart(2, '0')}`;
    followMonthInput.addEventListener('change', () => {
      if (currentLocation) loadFindings(currentLocation);
    });

    // 拠点選択
    document.querySelectorAll('[data-location]').forEach(btn => {
      btn.addEventListener('click', () => {
        const loc = btn.dataset.location;
        sessionStorage.setItem('safetyPatrolLocation', loc);
        showMain(loc);
      });
    });
    const saved = sessionStorage.getItem('safetyPatrolLocation');
    if (saved) showMain(saved);

    changeLocationBtn.addEventListener('click', () => {
      sessionStorage.removeItem('safetyPatrolLocation');
      mainScreen.classList.add('hidden');
      locationScreen.classList.remove('hidden');
    });

    // タブ切替
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab === 'follow' ? 'tabFollow' : 'tabNew').classList.add('active');
      });
    });

    // フォロー: 写真
    followCameraBtn.addEventListener('click', () => followCameraInput.click());
    followGalleryBtn.addEventListener('click', () => followGalleryInput.click());
    followCameraInput.addEventListener('change', (e) => handlePhoto(e.target.files[0], 'follow'));
    followGalleryInput.addEventListener('change', (e) => handlePhoto(e.target.files[0], 'follow'));
    followSendBtn.addEventListener('click', submitFollow);

    // 新規: 写真
    newCameraBtn.addEventListener('click', () => newCameraInput.click());
    newGalleryBtn.addEventListener('click', () => newGalleryInput.click());
    newCameraInput.addEventListener('change', (e) => handlePhoto(e.target.files[0], 'new'));
    newGalleryInput.addEventListener('change', (e) => handlePhoto(e.target.files[0], 'new'));
    workplaceSelect.addEventListener('change', () => {
      localStorage.setItem('safetyPatrolLastWorkplace', workplaceSelect.value);
      updateNewSendBtn();
    });
    commentInput.addEventListener('input', updateNewSendBtn);
    newSendBtn.addEventListener('click', submitNew);
  }

  async function showMain(location) {
    currentLocation = location;
    locationChip.textContent = location === 'honsha' ? '🏢 本社' : '🏭 北洞';
    locationScreen.classList.add('hidden');
    mainScreen.classList.remove('hidden');
    await Promise.all([loadFindings(location), loadWorkplaces(location)]);
  }

  // ========================================
  // フォロータブ
  // ========================================

  async function loadFindings(location) {
    findingList.innerHTML = '<div class="empty-msg">読み込み中...</div>';
    followForm.classList.add('hidden');
    selectedFindingId = null;

    // 対象月セレクタの値で指摘を絞り込む (デフォルトは先月)
    const monthVal = followMonthInput.value;
    if (!monthVal) return;
    const [y, m] = monthVal.split('-').map(Number);
    const dateFrom = `${y}-${String(m).padStart(2, '0')}-01`;
    const lastDay = new Date(y, m, 0).getDate();
    const dateTo = `${y}-${String(m).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

    const { data, error } = await supabase
      .from('js_safety_findings')
      .select('id, patrol_date, location, workplace_id, comment, before_photo_path, after_photo_path, dismissed_at')
      .eq('location', location)
      .gte('patrol_date', dateFrom)
      .lte('patrol_date', dateTo)
      .is('dismissed_at', null)
      .order('patrol_date')
      .order('workplace_id');

    if (error) { findingList.innerHTML = '<div class="empty-msg">読込エラー</div>'; return; }

    const { data: wps } = await supabase.from('js_safety_workplaces').select('id, name').eq('location', location);
    const wpMap = {};
    (wps || []).forEach(w => { wpMap[w.id] = w.name; });

    findings = (data || []).map(f => ({
      ...f,
      workplace_name: wpMap[f.workplace_id] || '不明',
      before_url: f.before_photo_path ? getPublicUrl(f.before_photo_path) : null,
      before_thumb_url: f.before_photo_path ? getThumbUrl(f.before_photo_path, 200) : null,
      isDone: !!f.after_photo_path
    }));
    renderFindingList();
  }

  function getPublicUrl(path) {
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
  }

  // Supabase Image Transform (Pro プラン以上で使用可)。サムネ取得の高速化用。
  // 原寸が必要な箇所 (Before 写真の大表示・Electron 側) は getPublicUrl を使う。
  function getThumbUrl(path, width) {
    return `${SUPABASE_URL}/storage/v1/render/image/public/${BUCKET}/${path}?width=${width}&quality=60&resize=cover`;
  }

  function renderFindingList() {
    const undone = findings.filter(f => !f.isDone);
    const done = findings.filter(f => f.isDone);

    if (findings.length === 0) {
      findingList.innerHTML = '<div class="empty-msg">この月の指摘がありません</div>';
      return;
    }
    findingList.innerHTML = '';

    if (undone.length === 0) {
      const msg = document.createElement('div');
      msg.className = 'empty-msg';
      msg.textContent = '全件フォロー完了!';
      findingList.appendChild(msg);
    }

    undone.forEach(f => findingList.appendChild(createCard(f, false)));
    done.forEach(f => findingList.appendChild(createCard(f, true)));
  }

  function createCard(f, isDone) {
    const card = document.createElement('div');
    card.className = 'finding-card' + (isDone ? ' done' : '') + (f.id === selectedFindingId ? ' selected' : '');
    card.innerHTML = `
      ${f.before_thumb_url ? `<img class="finding-thumb" src="${f.before_thumb_url}" alt="" loading="lazy">` : '<div class="finding-thumb"></div>'}
      <div class="finding-info">
        <div class="finding-workplace">${esc(f.workplace_name)}</div>
        <div class="finding-comment">${esc(f.comment || '')}</div>
        <div class="finding-date">${f.patrol_date}${isDone ? ' <span class="finding-done-badge">✓ フォロー済み</span>' : ''}</div>
      </div>
      ${isDone ? `<button class="finding-reset-btn" data-reset-id="${f.id}" title="対象違いの写真をアップした時の取消">↺ 取消</button>` : ''}
    `;
    // カードクリック: 未完了 → 選択してフォロー画面へ / 完了 → Before/After 閲覧
    card.addEventListener('click', () => {
      if (isDone) showFindingPhotos(f);
      else selectFinding(f);
    });
    // done カードの「↺ 取消」ボタン
    const resetBtn = card.querySelector('.finding-reset-btn');
    if (resetBtn) {
      resetBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(resetBtn.dataset.resetId);
        if (!id) return;
        if (!confirm('このAfter写真を取り消して撮り直しますか？\n（対象違いの写真をアップしてしまった時の救済用）')) return;
        try {
          const { error } = await supabase
            .from('js_safety_findings')
            .update({ after_photo_path: null, followed_at: null, follow_comment: null })
            .eq('id', id);
          if (error) throw error;
          await loadFindings(currentLocation);
        } catch (err) {
          alert('取消失敗: ' + (err.message || err));
        }
      });
    }
    return card;
  }

  // 完了済みカードの Before/After 閲覧オーバーレイ
  function showFindingPhotos(f) {
    document.querySelector('.photo-view-overlay')?.remove();
    const afterUrl = f.after_photo_path ? getPublicUrl(f.after_photo_path) : null;
    const overlay = document.createElement('div');
    overlay.className = 'photo-view-overlay';
    overlay.innerHTML = `
      <div class="photo-view-dialog">
        <button class="photo-view-close" aria-label="閉じる">✕</button>
        <div class="photo-view-title">${esc(f.workplace_name || '')}</div>
        <div class="photo-view-date">${f.patrol_date}</div>
        <div class="photo-view-comment">${esc(f.comment || '')}</div>
        <div class="photo-view-label">📷 Before</div>
        <img class="photo-view-img" src="${f.before_url || ''}" alt="before">
        ${afterUrl ? `<div class="photo-view-label">✅ After</div><img class="photo-view-img" src="${afterUrl}" alt="after">` : ''}
      </div>
    `;
    // 背景クリックで閉じる（ダイアログ内クリックは伝播させない）
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.remove();
    });
    overlay.querySelector('.photo-view-close').addEventListener('click', () => overlay.remove());
    document.body.appendChild(overlay);
  }

  function selectFinding(f) {
    selectedFindingId = f.id;
    followFile = null;
    followCameraInput.value = '';
    followGalleryInput.value = '';
    followPhotoPreview.innerHTML = 'After写真を撮影または選択';
    followStatus.classList.add('hidden');
    updateFollowSendBtn();

    findingList.querySelectorAll('.finding-card').forEach(c => c.classList.remove('selected'));
    const undone = findings.filter(x => !x.isDone);
    const cards = findingList.querySelectorAll('.finding-card:not(.done)');
    cards.forEach((c, i) => { if (undone[i] && undone[i].id === f.id) c.classList.add('selected'); });

    beforePhoto.src = f.before_url || '';
    followForm.classList.remove('hidden');
    setTimeout(() => followForm.scrollIntoView({ behavior: 'smooth' }), 100);
  }

  function updateFollowSendBtn() {
    followSendBtn.disabled = !(selectedFindingId && followFile);
  }

  async function submitFollow() {
    if (!selectedFindingId || !followFile) return;
    followSendBtn.disabled = true;
    showStatusEl(followStatus, '送信中...', 'uploading');

    try {
      const ext = (followFile.name.split('.').pop() || 'jpg').toLowerCase();
      const storagePath = `${FOLDER}/${Date.now()}_${Math.random().toString(36).slice(2, 6)}.${ext}`;

      const { error: upErr } = await supabase.storage.from(BUCKET).upload(storagePath, followFile, { contentType: followFile.type, upsert: false });
      if (upErr) throw upErr;

      const { error: updErr } = await supabase.from('js_safety_findings').update({
        after_photo_path: storagePath,
        follow_comment: null,
        followed_at: new Date().toISOString()
      }).eq('id', selectedFindingId);
      if (updErr) throw updErr;

      showStatusEl(followStatus, '✅ フォロー送信完了', 'success');
      const f = findings.find(x => x.id === selectedFindingId);
      if (f) f.isDone = true;
      selectedFindingId = null;

      setTimeout(() => {
        followForm.classList.add('hidden');
        renderFindingList();
        followStatus.classList.add('hidden');
      }, 1500);
    } catch (err) {
      showStatusEl(followStatus, `エラー: ${err.message || '送信失敗'}`, 'error');
      followSendBtn.disabled = false;
    }
  }

  // ========================================
  // 新規指摘タブ
  // ========================================

  async function loadWorkplaces(location) {
    workplaceSelect.innerHTML = '<option value="">読み込み中...</option>';
    const { data, error } = await supabase
      .from('js_safety_workplaces').select('id, name')
      .eq('location', location).eq('is_active', true).order('sort_order');

    if (error) { workplaceSelect.innerHTML = '<option value="">読込失敗</option>'; return; }

    workplaceSelect.innerHTML = '<option value="">-- 選択してください --</option>' +
      (data || []).map(w => `<option value="${w.id}">${w.name}</option>`).join('');

    const lastId = localStorage.getItem('safetyPatrolLastWorkplace');
    if (lastId && (data || []).some(w => String(w.id) === String(lastId))) workplaceSelect.value = lastId;
    updateNewSendBtn();
  }

  function updateNewSendBtn() {
    newSendBtn.disabled = !(workplaceSelect.value && commentInput.value.trim() && newFile);
  }

  async function submitNew() {
    if (!newFile) return;
    newSendBtn.disabled = true;
    showStatusEl(newStatus, '送信中...', 'uploading');

    try {
      const ext = (newFile.name.split('.').pop() || 'jpg').toLowerCase();
      const storagePath = `${FOLDER}/${Date.now()}_${Math.random().toString(36).slice(2, 6)}.${ext}`;

      const { error: upErr } = await supabase.storage.from(BUCKET).upload(storagePath, newFile, { contentType: newFile.type, upsert: false });
      if (upErr) throw upErr;

      const today = new Date();
      const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      const { error: insErr } = await supabase.from('js_safety_findings').insert({
        patrol_date: dateStr,
        location: currentLocation,
        workplace_id: parseInt(workplaceSelect.value, 10),
        comment: commentInput.value.trim(),
        before_photo_path: storagePath,
        created_by: 'mobile'
      });
      if (insErr) throw insErr;

      totalSubmitted++;
      showStatusEl(newStatus, '✅ 送信完了', 'success');
      newCounter.classList.remove('hidden');
      newCounter.textContent = `本日の登録件数: ${totalSubmitted}件`;

      setTimeout(() => {
        commentInput.value = '';
        newFile = null;
        newCameraInput.value = '';
        newGalleryInput.value = '';
        newPhotoPreview.innerHTML = '写真を撮影または選択';
        updateNewSendBtn();
        newStatus.classList.add('hidden');
      }, 1500);
    } catch (err) {
      showStatusEl(newStatus, `エラー: ${err.message || '送信失敗'}`, 'error');
      newSendBtn.disabled = false;
    }
  }

  // ========================================
  // 共通ユーティリティ
  // ========================================

  function handlePhoto(file, mode) {
    if (!file) return;
    const preview = mode === 'follow' ? followPhotoPreview : newPhotoPreview;
    const cameraInput = mode === 'follow' ? followCameraInput : newCameraInput;
    const galleryInput = mode === 'follow' ? followGalleryInput : newGalleryInput;

    if (mode === 'follow') followFile = file;
    else newFile = file;

    const reader = new FileReader();
    reader.onload = (e) => {
      preview.innerHTML = `<img src="${e.target.result}" alt="preview"><button class="photo-remove">✕</button>`;
      preview.querySelector('.photo-remove').addEventListener('click', () => {
        if (mode === 'follow') followFile = null;
        else newFile = null;
        cameraInput.value = '';
        galleryInput.value = '';
        preview.innerHTML = mode === 'follow' ? 'After写真を撮影または選択' : '写真を撮影または選択';
        if (mode === 'follow') updateFollowSendBtn();
        else updateNewSendBtn();
      });
    };
    reader.readAsDataURL(file);
    if (mode === 'follow') updateFollowSendBtn();
    else updateNewSendBtn();
  }

  function showStatusEl(el, msg, type) {
    el.className = `status status-${type}`;
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
